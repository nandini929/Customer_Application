# Base configuration (overridden by profile)
spring.application.name=customer-manager
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${SERVER_PORT:8080}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Actuator: expose health and info only by default
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# App config (override in prod via env)
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:8080}
# Expose error detail in API (set false in prod)
app.api.expose-error-detail=${APP_API_EXPOSE_ERROR_DETAIL:true}
