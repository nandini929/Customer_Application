# Production profile: persistent H2 file, console disabled
spring.datasource.url=jdbc:h2:file:${DATA_DIR:./data}/customerdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 console disabled in production
spring.h2.console.enabled=false

# Do not expose exception detail in API responses
app.api.expose-error-detail=false

# Actuator: health only, no sensitive info
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
