<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Customer Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .login-card { max-width: 360px; margin: 0 auto; }
        .login-card input { width: 100%; }
        .login-card button { width: 100%; margin-top: 12px; }
        .login-error { color: #fecaca; font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="app">
    <div class="card login-card">
        <div class="header">
            <h1>Customer Manager</h1>
        </div>
        <form method="post" action="/login" id="login-form">
            <input type="hidden" name="_csrf" id="csrf-token">
            <div>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit">Sign in</button>
            <div id="login-error" class="login-error" style="display:none;"></div>
        </form>
    </div>
</div>
<script>
    (function() {
        var match = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
        if (match) document.getElementById('csrf-token').value = decodeURIComponent(match[1]);
    })();
    var params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
        document.getElementById('login-error').textContent = 'Invalid username or password.';
        document.getElementById('login-error').style.display = 'block';
    }
</script>
</body>
</html>
