# Development profile: in-memory H2, console enabled
spring.datasource.url=jdbc:h2:mem:customerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security: direct access in dev (no login). Set to true to test login locally.
app.security.require-auth=false
app.security.username=${APP_USERNAME:admin}
app.security.password=${APP_PASSWORD:admin}
